version: '3.8'
services:
  tcp-server:
    image: my-tcp-server:latest
    container_name: my-tcp-server
    ports:
      - "8888:8888"
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - app-network
  redis:
    image: redis:latest
    container_name: my-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
volumes:
  redis-data:
